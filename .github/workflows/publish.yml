name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  check_release_readme:
    name: Block release if README is dev-mode
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Verify README is release-ready
        run: |
          dev_note="Note: This page documents the latest development version of STUNner."

          for f in README.md docs/README.md; do
            if grep -Fq "$dev_note" "$f"; then
              echo "::error title=Release blocked::$f still contains the development-version note. This is a human error in release preparation. Remove the note, commit, and retag."
              exit 1
            fi
          done

  run_tests:
    name: Run tests
    needs: check_release_readme
    uses: l7mp/stunner/.github/workflows/test.yml@main

  push_stunner_to_registry:
    name: Push STUNner image to DockerHub
    needs: run_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: l7mp/stunnerd
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  push_chart:
    name: Push helm charts to the repo
    needs: push_stunner_to_registry
    uses: l7mp/stunner/.github/workflows/publish--push-charts.yml@main
    with:
      dev: false
    secrets: inherit

  push_icetester_to_registry:
    name: Push icetester image to DockerHub
    needs: run_tests
    if: github.repository == 'l7mp/stunner'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: l7mp/icetester
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          file: Dockerfile.icetester
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  add_binaries:
    name: Add binaries to release assets
    uses: l7mp/stunner/.github/workflows/publish--add-binaries.yml@main
    needs: run_tests
