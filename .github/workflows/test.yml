name: Tests

on:
  workflow_call:
  workflow_dispatch:
  push:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: '1.26'
      - name: Download modules
        run: go mod download
      - name: Go install
        run: go install
      - name: Test
        run: go test -v -covermode=count -coverprofile=coverage.out
      - name: Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e
        if: github.repository == 'l7mp/stunner'
        with:
          github-token: ${{ secrets.github_token }}
          file: coverage.out
          format: golang
  seccheck:
    name: Security Check
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - name: Check security vulnerabilites
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          path: "."
          fail-build: true
          severity-cutoff: critical
